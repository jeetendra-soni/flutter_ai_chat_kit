name: Publish to Pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*' # Triggers when you push a tag like v0.0.3

jobs:
  publish:
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1